{% extends "base.html" %}

{% block nav %}
<nav>
  <a class="nav-brand" style="cursor: default;">
    <span class="brain-icon">🧠</span> PPST
  </a>
  
  <a class="nav-link {% block nav_test %}active{% endblock %}" id="nav-instructions" href="{% url 'patient:instructions' test.id %}">Instructions</a>
  <div class="nav-spacer"></div>
  <button class="btn-nav-outline" id="patient-access-btn">Patient Access</button>
</nav>
{% endblock %}

{% block content %}
<style>

  .lang-pill {
  display: none !important;
  }
  
  .video-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  .video-box {
    aspect-ratio: 16 / 9;
    background: var(--charcoal);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    margin-bottom: 40px;
    min-height: 600px;
  }

  .video-box iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* High Contrast Mode Coloring */
  body.high-contrast {
    --bg: #000000;
    --white: #000000;
    --charcoal: #ffffff;
    --mid: #ffffff;
    --muted: #cccccc;
    --border: #ffffff;
    --blue: #ffff00;
    --blue-dark: #ffcc00;
    --blue-light: #333300;
    --shadow: 0 2px 12px rgba(255,255,255,0.3);
    --shadow-lg: 0 8px 32px rgba(255,255,255,0.4);
    background-color: #000000 !important;
    color: #ffffff !important;
  }

  body.high-contrast .page-content {
    background-color: #000000;
    color: #ffffff;
  }

  body.high-contrast .hero-title {
    color: #ffffff !important;
  }

  body.high-contrast .video-box {
    background: #333333;
    border: 2px solid #ffffff;
  }

  body.high-contrast .btn-secondary {
    background-color: #ffff00 !important;
    color: #000000 !important;
    border: 2px solid #ffffff;
  }

  body.high-contrast .btn-secondary:hover {
    background-color: #ffcc00 !important;
    color: #000000 !important;
  }

  body.high-contrast nav {
    background-color: #000000 !important;
    border-bottom: 2px solid #ffffff !important;
  }

  body.high-contrast .nav-brand,
  body.high-contrast .nav-link,
  body.high-contrast .btn-nav-outline {
    color: #ffffff !important;
    border-color: #ffffff !important;
  }

  body.high-contrast .btn-nav-outline {
    background-color: #000000 !important;
    border: 2px solid #ffffff !important;
  }

  body.high-contrast .btn-nav-outline:hover {
    background-color: #ffff00 !important;
    color: #000000 !important;
  }</style>

<div class="page-content" style="padding: 50px; text-align: center;">
  <h1 class="hero-title" id="page-title" style="font-size: 3em; margin-bottom: 50px;">Video Guide</h1>
  
  <div class="video-container">
    <div class="video-box">
      <iframe width="560" height="315" src="https://www.youtube.com/embed/Ku0nrEre2F0?si=Dj9cD8KtavhhQi93" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
    
    <div style="display: flex; justify-content: center;">
      <a class="btn btn-secondary btn-large" id="begin-test-btn" style="font-size: 1.8em; padding: 20px 50px;" href="{% url 'patient:practice_intro' test.id %}">Begin Test</a>
    </div>
  </div>
</div>

<script>
// Apply high contrast mode if enabled
document.addEventListener('DOMContentLoaded', function() {
    const isHighContrast = localStorage.getItem('ppst-high-contrast') === 'true';
    if (isHighContrast) {
        document.body.classList.add('high-contrast');
    }

    const savedLanguage = localStorage.getItem('ppst-language') || 'ENG';

    const translations = {
        ENG: {
            navHome: "Home",
            navAbout: "About",
            navInstructions: "Instructions",
            patientAccess: "Patient Access",
            pageTitle: "Video Guide",
            beginTest: "Begin Test"
        },
        ESP: {
            navHome: "Inicio",
            navAbout: "Acerca de",
            navInstructions: "Instrucciones",
            patientAccess: "Acceso del paciente",
            pageTitle: "Guía en video",
            beginTest: "Comenzar prueba"
        },
        FRE: {
            navHome: "Page d'accueil",
            navAbout: "À propos de",
            navInstructions: "Instructions",
            patientAccess: "Accès des patients",
            pageTitle: "Guide vidéo",
            beginTest: "Commencer le test"
        }
      };

    const text = translations[savedLanguage] || translations.ENG;
    
    document.getElementById('nav-instructions').textContent = text.navInstructions;
    document.getElementById('patient-access-btn').textContent = text.patientAccess;
    document.getElementById('page-title').textContent = text.pageTitle;
    document.getElementById('begin-test-btn').textContent = text.beginTest;
    
});
</script>
{% endblock %}
